name: Deploy to GitHub Pages

on:
  # Trigger the workflow on every push to the `main` branch
  push:
    branches: [ main ]
  # Allows running this workflow manually from the Actions tab on GitHub
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Install, build, and upload site
        uses: withastro/action@v5
        # with:
          # path: . # The root location of the Astro project inside the repository. (optional)
          # node-version: 24 # The specific version of Node that should be used to build the site. Defaults to 22. (optional)
          # package-manager: pnpm@latest # The Node package manager that should be used to install dependencies and build the site. Automatically detected based on the lockfile. (optional)
          # build-cmd: pnpm run build # The command to run to build the site. Runs the package build script/task by default. (optional)
        # env:
          # PUBLIC_POKEAPI: 'https://pokeapi.co/api/v2' # Use single quotation marks for the variable value. (optional)

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
